all:
  hosts:
    staging:
      ansible_host: 57.130.10.246  # OVH dedicated host for the staging example-app VM
      ansible_user: ubuntu
      ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | default('/tmp/deploy-key', true) }}"
      cp_url: "https://app-staging.devopsdefender.com"
  vars:
    dd_env: staging
    datacenter: ovh-eu
    agent_memory: 8G
    agent_cpus: 4
    agent_node_size: standard   # The example app lands on this OVH VM
    agent_tdx: true             # Keep staging attestation aligned with production

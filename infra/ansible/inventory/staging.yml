all:
  hosts:
    staging:
      ansible_host: 57.130.10.246  # OVH dedicated server — agent runs as KVM VM on this host
      ansible_user: ubuntu
      ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | default('/tmp/deploy-key', true) }}"
      cp_url: "https://app-staging.slopandmop.com"
      cp_public_hostname: "app-staging.slopandmop.com"
      dd_cp_cf_domain: "slopandmop.com"
  vars:
    dd_env: staging
    datacenter: ovh-eu
    cp_local_vm: true       # boot staging control plane on OVH for isolated staging infra
    cp_memory: 4G
    cp_cpus: 4
    agent_memory: 8G
    agent_cpus: 4
    agent_node_size: standard
    agent_tdx: true           # Staging agents must launch with TDX enabled for attestation

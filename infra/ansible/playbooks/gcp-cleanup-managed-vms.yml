---
- name: Cleanup managed GCP VMs
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dd_env_name: ""
  tasks:
    - name: Validate GCP project
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
        fail_msg: "GCP_PROJECT_ID is required"

    - name: Build cleanup filter
      ansible.builtin.set_fact:
        cleanup_filter: >-
          labels.devopsdefender=managed{% if dd_env_name | length > 0 %} AND labels.dd_env={{ dd_env_name }}{% endif %}

    - name: List managed instances
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - list
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --filter
          - "{{ cleanup_filter }}"
          - --format
          - value(name,zone.basename())
      register: managed_instances_cmd
      changed_when: false

    - name: Normalize managed instances list
      ansible.builtin.set_fact:
        managed_instances: "{{ managed_instances_cmd.stdout_lines | reject('equalto', '') | list }}"

    - name: Print cleanup target summary
      ansible.builtin.debug:
        msg: >-
          Managed instances matching '{{ cleanup_filter }}': {{ managed_instances | length }}

    # Cloudflare tunnel and DNS cleanup is managed by the control plane itself.
    # The CP cleans agent tunnels on agent deletion, stale-agent timeout, and
    # graceful shutdown. No Ansible CF tasks are needed.

    - name: Delete managed instance
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - delete
          - "{{ item.split()[0] }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ item.split()[1] }}"
          - --quiet
      loop: "{{ managed_instances }}"
      loop_control:
        label: "{{ item }}"
      register: delete_cmd
      when: managed_instances | length > 0

    # ── Cleanup stale images (keep only the latest per family) ──────────
    - name: List managed images
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - list
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --filter
          - "labels.devopsdefender=managed"
          - --sort-by
          - "~creationTimestamp"
          - --format
          - "value(name,family)"
      register: managed_images_raw
      changed_when: false

    - name: Identify stale images (keep latest per family)
      ansible.builtin.set_fact:
        stale_images: >-
          {%- set seen_families = [] -%}
          {%- set stale = [] -%}
          {%- for line in managed_images_raw.stdout_lines -%}
            {%- set parts = line.split() -%}
            {%- if parts | length >= 2 -%}
              {%- set name = parts[0] -%}
              {%- set family = parts[1] -%}
              {%- if family in seen_families -%}
                {%- set _ = stale.append(name) -%}
              {%- else -%}
                {%- set _ = seen_families.append(family) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ stale }}

    - name: Delete stale images
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - delete
          - "{{ item }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --quiet
      loop: "{{ stale_images }}"
      when: stale_images | length > 0
      failed_when: false

    # ── Cleanup orphaned Packer resources ─────────────────────────────────
    - name: List orphaned Packer VMs
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - list
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --filter
          - "name~^packer-"
          - --format
          - "value(name,zone.basename())"
      register: packer_vms_raw
      changed_when: false

    - name: Delete orphaned Packer VMs
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - delete
          - "{{ item.split()[0] }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ item.split()[1] }}"
          - --quiet
      loop: "{{ packer_vms_raw.stdout_lines | reject('equalto', '') | list }}"
      when: packer_vms_raw.stdout_lines | reject('equalto', '') | list | length > 0
      failed_when: false

    - name: List orphaned Packer disks
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - disks
          - list
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --filter
          - "name~^packer-"
          - --format
          - "value(name,zone.basename())"
      register: packer_disks_raw
      changed_when: false

    - name: Delete orphaned Packer disks
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - disks
          - delete
          - "{{ item.split()[0] }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ item.split()[1] }}"
          - --quiet
      loop: "{{ packer_disks_raw.stdout_lines | reject('equalto', '') | list }}"
      when: packer_disks_raw.stdout_lines | reject('equalto', '') | list | length > 0
      failed_when: false

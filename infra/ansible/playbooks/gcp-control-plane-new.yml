---
- name: Launch GCP control plane
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_port: 8080
    cp_wait: true
    cp_timeout_seconds: 600
    cp_zone: ""
    cp_size: ""
    output_json_path: /tmp/dd-gcp-control-plane.json
    cp_size_profiles:
      tiny:
        machine_type: c3-standard-4
        disk_gib: 80
      standard:
        machine_type: c3-standard-8
        disk_gib: 100
  tasks:
    - name: Validate GCP project
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
        fail_msg: "GCP_PROJECT_ID is required"

    - name: Resolve control-plane defaults
      ansible.builtin.set_fact:
        resolved_env_name: "{{ (lookup('env', 'DD_ENV') | default('staging', true)) | lower }}"
        resolved_domain: "{{ lookup('env', 'DD_DOMAIN') | default('devopsdefender.com', true) }}"
        resolved_network_name: "{{ lookup('env', 'DD_NETWORK_NAME') | default('', true) }}"
        resolved_cp_zone: "{{ cp_zone if (cp_zone | length > 0) else ((lookup('env', 'GCP_ZONE') | default(lookup('env', 'AGENT_DATACENTER_AZ'), true)) | default('us-central1-a', true)) }}"

    - name: Resolve control-plane size
      ansible.builtin.set_fact:
        resolved_cp_size: "{{ cp_size | lower if (cp_size | length > 0) else 'tiny' }}"

    - name: Validate control-plane size
      ansible.builtin.assert:
        that:
          - resolved_cp_size in cp_size_profiles
        fail_msg: "Unsupported control-plane size '{{ resolved_cp_size }}'"

    - name: Resolve control-plane profile and labels
      ansible.builtin.set_fact:
        cp_profile: "{{ cp_size_profiles[resolved_cp_size] }}"
        env_label: "{{ (resolved_env_name | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'staging' }}"
        network_label: "{{ ((resolved_network_name if (resolved_network_name | length > 0) else 'default') | lower | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'default' }}"

    - name: Resolve control-plane DNS alias
      ansible.builtin.set_fact:
        alias_host: "{{ ('app-staging.' ~ resolved_domain) if resolved_env_name == 'staging' else ('app.' ~ resolved_domain) }}"
        cp_url_for_agents: "{{ ('https://app-staging.' ~ resolved_domain) if resolved_env_name == 'staging' else ('https://app.' ~ resolved_domain) }}"

    - name: Resolve source image selector values
      ansible.builtin.set_fact:
        source_image_project: "{{ lookup('env', 'DD_GCP_IMAGE_PROJECT') | default(lookup('env', 'GCP_PROJECT_ID'), true) }}"
        source_image_name_env: "{{ lookup('env', 'DD_GCP_IMAGE_NAME') | default('', true) }}"
        source_image_family: "{{ lookup('env', 'DD_GCP_IMAGE_FAMILY') | default('dd-agent-main', true) }}"

    - name: Read source image by explicit name
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - describe
          - "{{ source_image_name_env }}"
          - --project
          - "{{ source_image_project }}"
          - --format
          - json
      register: source_image_describe_cmd
      changed_when: false
      when: source_image_name_env | length > 0

    - name: Read source image from family
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - describe-from-family
          - "{{ source_image_family }}"
          - --project
          - "{{ source_image_project }}"
          - --format
          - json
      register: source_image_family_cmd
      changed_when: false
      when: source_image_name_env | length == 0

    - name: Parse source image JSON
      ansible.builtin.set_fact:
        source_image_json: "{{ (source_image_describe_cmd.stdout if (source_image_name_env | length > 0) else source_image_family_cmd.stdout) | from_json }}"

    - name: Extract source image values
      ansible.builtin.set_fact:
        source_image_name: "{{ source_image_json.name | default(source_image_name_env) }}"
        source_image_disk_gib: "{{ source_image_json.diskSizeGb | default('0') }}"

    - name: Validate resolved source image metadata
      ansible.builtin.assert:
        that:
          - source_image_name | length > 0
          - source_image_disk_gib is match('^[0-9]+$')
        fail_msg: "Failed to resolve source image and disk size"

    - name: Resolve control-plane boot disk size
      ansible.builtin.set_fact:
        cp_boot_disk_gib: "{{ [cp_profile.disk_gib | int, source_image_disk_gib | int] | max }}"

    - name: Resolve control-plane config env inputs
      ansible.builtin.set_fact:
        admin_password_env: >-
          {{
            lookup('env', 'CP_ADMIN_PASSWORD')
            | default(
                lookup('env', 'DD_CP_ADMIN_PASSWORD')
                | default(lookup('env', 'ADMIN_PASSWORD'), true),
                true
              )
          }}
        dd_agent_ita_api_key_env: "{{ lookup('env', 'DD_AGENT_ITA_API_KEY') | default(lookup('env', 'ITA_API_KEY') | default(lookup('env', 'INTEL_API_KEY'), true), true) }}"

    - name: Build control-plane raw_kv payload (env vars forwarded to dd-cp)
      ansible.builtin.set_fact:
        raw_kv_all:
          DD_CP_BIND_ADDR: "0.0.0.0:{{ cp_port }}"
          DD_CP_DATABASE_URL: "sqlite://devopsdefender.db?mode=rwc"
          DD_CP_ADMIN_PASSWORD: "{{ admin_password_env }}"
          DD_CP_CF_API_TOKEN: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"
          DD_CP_CF_ACCOUNT_ID: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_ID') | default('', true) }}"
          DD_CP_CF_ZONE_ID: "{{ lookup('env', 'CLOUDFLARE_ZONE_ID') | default('', true) }}"
          DD_CP_CF_DOMAIN: "{{ resolved_domain }}"
          DD_CP_PUBLIC_HOSTNAME: "{{ alias_host }}"
          DD_ENV: "{{ lookup('env', 'DD_ENV') | default('', true) }}"
          DD_CP_GIT_SHA: "{{ lookup('env', 'DD_GIT_SHA') | default('', true) }}"
          DD_CP_NONCE_ENFORCEMENT_MODE: "{{ lookup('env', 'NONCE_ENFORCEMENT_MODE') | default('optional', true) }}"
          DD_CP_TCB_ENFORCEMENT_MODE: "{{ lookup('env', 'TCB_ENFORCEMENT_MODE') | default('warn', true) }}"
          DD_CP_RTMR_ENFORCEMENT_MODE: "{{ lookup('env', 'RTMR_ENFORCEMENT_MODE') | default('warn', true) }}"
          DD_CP_ITA_JWKS_URL: "{{ lookup('env', 'DD_CP_ITA_JWKS_URL') | default('', true) }}"
          DD_CP_ITA_ISSUER: "{{ lookup('env', 'DD_CP_ITA_ISSUER') | default('', true) }}"

    - name: Remove empty raw_kv values and build config
      ansible.builtin.set_fact:
        control_plane_config:
          mode: control-plane
          port: "{{ cp_port | int }}"
          raw_kv: "{{ raw_kv_all | dict2items | rejectattr('value', 'equalto', '') | rejectattr('value', 'equalto', none) | items2dict }}"

    - name: Resolve control-plane name seed raw
      ansible.builtin.set_fact:
        cp_name_seed_raw: "{{ resolved_network_name if (resolved_network_name | length > 0) else lookup('pipe', 'cat /proc/sys/kernel/random/uuid | tr -d - | cut -c1-8') }}"

    - name: Resolve control-plane name seed label
      ansible.builtin.set_fact:
        cp_name_seed_label: "{{ ((cp_name_seed_raw | lower) | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'default' }}"

    - name: Build control-plane name candidate
      ansible.builtin.set_fact:
        cp_name_candidate: "dd-cp-{{ env_label }}-{{ cp_name_seed_label }}-{{ lookup('pipe', 'date +%s') }}"

    - name: Finalize control-plane VM name
      ansible.builtin.set_fact:
        cp_name: "{{ (((cp_name_candidate | lower | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) | truncate(63, true, '')) | regex_replace('-+$', '')) or ('dd-cp-' ~ lookup('pipe', 'date +%s')) }}"

    - name: Allocate startup script file
      ansible.builtin.tempfile:
        state: file
        suffix: .sh
      register: cp_startup_script_file

    - name: Render control-plane startup script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/control-plane-startup.sh.j2"
        dest: "{{ cp_startup_script_file.path }}"
        mode: "0755"
      vars:
        control_plane_config_json: "{{ control_plane_config | to_nice_json }}"

    - name: Create control-plane VM (primary size)
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - create
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --machine-type
          - "{{ cp_profile.machine_type }}"
          - --boot-disk-size
          - "{{ cp_boot_disk_gib }}GB"
          - --boot-disk-type
          - pd-balanced
          - --maintenance-policy
          - TERMINATE
          - --provisioning-model
          - STANDARD
          - --confidential-compute-type
          - TDX
          - --labels
          - "devopsdefender=managed,dd_role=control-plane,dd_env={{ env_label }},dd_network={{ network_label }}"
          - --metadata
          - serial-port-enable=1,enable-oslogin=FALSE
          - --metadata-from-file
          - "startup-script={{ cp_startup_script_file.path }}"
          - --scopes
          - https://www.googleapis.com/auth/cloud-platform
          - --image-project
          - "{{ source_image_project }}"
          - --image
          - "{{ source_image_name }}"
      register: cp_create_primary
      failed_when: false
      changed_when: cp_create_primary.rc == 0

    - name: Evaluate control-plane quota fallback condition
      ansible.builtin.set_fact:
        cp_create_error_text: "{{ (cp_create_primary.stderr | default('')) ~ '\n' ~ (cp_create_primary.stdout | default('')) }}"
        cp_needs_quota_fallback: >-
          {{
            (cp_create_primary.rc | int != 0)
            and (resolved_cp_size == 'standard')
            and ((((cp_create_primary.stderr | default('')) ~ '\n' ~ (cp_create_primary.stdout | default('')))
              | regex_search('C3_CPUS|CONCURRENT_OPERATIONS_QUOTA_EXCEEDED|ZONE_RESOURCE_POOL_EXHAUSTED|configuration_availability')) is not none)
          }}

    - name: Log control-plane quota fallback to tiny profile
      ansible.builtin.debug:
        msg: >-
          control-plane create failed for size='{{ resolved_cp_size }}' in zone='{{ resolved_cp_zone }}';
          retrying with tiny profile machine_type='{{ cp_size_profiles['tiny'].machine_type }}'.
      when: cp_needs_quota_fallback

    - name: Apply tiny profile fallback values
      ansible.builtin.set_fact:
        cp_profile: "{{ cp_size_profiles['tiny'] }}"
        cp_boot_disk_gib: "{{ [cp_size_profiles['tiny'].disk_gib | int, source_image_disk_gib | int] | max }}"
      when: cp_needs_quota_fallback

    - name: Create control-plane VM (tiny fallback)
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - create
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --machine-type
          - "{{ cp_profile.machine_type }}"
          - --boot-disk-size
          - "{{ cp_boot_disk_gib }}GB"
          - --boot-disk-type
          - pd-balanced
          - --maintenance-policy
          - TERMINATE
          - --provisioning-model
          - STANDARD
          - --confidential-compute-type
          - TDX
          - --labels
          - "devopsdefender=managed,dd_role=control-plane,dd_env={{ env_label }},dd_network={{ network_label }}"
          - --metadata
          - serial-port-enable=1,enable-oslogin=FALSE
          - --metadata-from-file
          - "startup-script={{ cp_startup_script_file.path }}"
          - --scopes
          - https://www.googleapis.com/auth/cloud-platform
          - --image-project
          - "{{ source_image_project }}"
          - --image
          - "{{ source_image_name }}"
      register: cp_create_fallback
      failed_when: false
      changed_when: cp_create_fallback.rc == 0
      when: cp_needs_quota_fallback

    - name: Fail when control-plane VM creation did not succeed
      ansible.builtin.fail:
        msg: >-
          control-plane VM creation failed.
          primary_rc={{ cp_create_primary.rc }}
          fallback_attempted={{ cp_needs_quota_fallback | bool }}
          fallback_rc={{ cp_create_fallback.rc | default('n/a') }}
          error={{ cp_create_error_text | trim }}
      when:
        - cp_create_primary.rc | int != 0
        - not (cp_needs_quota_fallback and (cp_create_fallback is defined) and (cp_create_fallback.rc | int == 0))

    - name: Remove temporary startup script
      ansible.builtin.file:
        path: "{{ cp_startup_script_file.path }}"
        state: absent
      when: cp_startup_script_file.path is defined

    - name: Wait for control-plane VM status RUNNING
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - describe
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --format
          - value(status)
      register: cp_status_cmd
      changed_when: false
      retries: 100
      delay: 3
      until: (cp_status_cmd.stdout | trim | upper) == 'RUNNING'

    - name: Read control-plane VM metadata
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - describe
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --format
          - json
      register: cp_meta_cmd
      changed_when: false

    - name: Parse control-plane VM metadata
      ansible.builtin.set_fact:
        cp_meta: "{{ cp_meta_cmd.stdout | from_json }}"
        cp_internal_ip: "{{ ((cp_meta_cmd.stdout | from_json).networkInterfaces | default([]) | first | default({})).networkIP | default('') }}"
        cp_external_ip: "{{ (((cp_meta_cmd.stdout | from_json).networkInterfaces | default([]) | first | default({})).accessConfigs | default([]) | first | default({})).natIP | default('') }}"

    - name: Set default control-plane URL
      ansible.builtin.set_fact:
        selected_url: "https://{{ alias_host }}"

    - name: Probe external control-plane health URL
      ansible.builtin.uri:
        url: "http://{{ cp_external_ip }}:{{ cp_port }}/health"
        method: GET
        status_code: 200
      register: cp_external_health
      retries: "{{ [1, ((cp_timeout_seconds | int + 2) // 3)] | max }}"
      delay: 3
      until: cp_external_health.status == 200
      failed_when: false
      when:
        - cp_wait | bool
        - cp_external_ip | length > 0

    - name: Select external URL when healthy
      ansible.builtin.set_fact:
        selected_url: "http://{{ cp_external_ip }}:{{ cp_port }}"
      when:
        - cp_wait | bool
        - cp_external_health is defined
        - cp_external_health.status | default(0) == 200

    - name: Probe internal control-plane health URL
      ansible.builtin.uri:
        url: "http://{{ cp_internal_ip }}:{{ cp_port }}/health"
        method: GET
        status_code: 200
      register: cp_internal_health
      retries: "{{ [1, ((cp_timeout_seconds | int + 2) // 3)] | max }}"
      delay: 3
      until: cp_internal_health.status == 200
      failed_when: false
      when:
        - cp_wait | bool
        - cp_internal_ip | length > 0
        - selected_url == ('https://' ~ alias_host)

    - name: Select internal URL when healthy
      ansible.builtin.set_fact:
        selected_url: "http://{{ cp_internal_ip }}:{{ cp_port }}"
      when:
        - cp_wait | bool
        - cp_internal_health is defined
        - cp_internal_health.status | default(0) == 200

    - name: Write control-plane metadata JSON
      ansible.builtin.copy:
        dest: "{{ output_json_path }}"
        mode: "0600"
        content: >-
          {{
            {
              'name': cp_name,
              'zone': resolved_cp_zone,
              'ip': (cp_external_ip if (cp_external_ip | length > 0) else cp_internal_ip),
              'internal_ip': cp_internal_ip,
              'external_ip': cp_external_ip,
              'control_plane_url': selected_url,
              'control_plane_hostname': alias_host,
              'bootstrap_agents': []
            } | to_nice_json
          }}

    - name: Load control-plane metadata JSON
      ansible.builtin.set_fact:
        cp_boot_json: "{{ lookup('file', output_json_path) | from_json }}"

    - name: Print control-plane metadata
      ansible.builtin.debug:
        var: cp_boot_json

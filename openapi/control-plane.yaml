openapi: "3.0.0"
info:
  title: DevOps Defender Control Plane
  version: "1.0"
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: Health check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/agents/challenge:
    get:
      operationId: agentChallenge
      responses:
        "200":
          description: Agent challenge nonce
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChallengeResponse"
  /api/agents/register:
    post:
      operationId: agentRegister
      responses:
        "200":
          description: Successful registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegisterResponse"
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        boot_id:
          type: string
          nullable: true
        git_sha:
          type: string
          nullable: true
      required: [ok]
    AgentChallengeResponse:
      type: object
      properties:
        nonce:
          type: string
        expires_in_seconds:
          type: integer
          format: uint64
      required: [nonce, expires_in_seconds]
    AgentRegisterResponse:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        tunnel_token:
          type: string
        hostname:
          type: string
      required: [agent_id, tunnel_token, hostname]

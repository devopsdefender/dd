name: Deploy to DevOps Defender

on:
  push:
    branches: [main]

# GitHub OIDC token -- DD verifies this instead of storing API keys
permissions:
  id-token: write
  packages: write
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  DD_API: https://app.devopsdefender.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Build and push your container image
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.IMAGE }}

      # 2. Get a short-lived GitHub OIDC token (no secrets needed)
      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('devopsdefender.com');
            core.setOutput('token', token);

      # 3. Deploy to DD -- one curl, that's it
      - name: Deploy
        id: deploy
        run: |
          resp=$(curl -fsSL "$DD_API/api/v1/deploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.token }}" \
            -d '{
              "image": "${{ env.IMAGE }}",
              "app_name": "hello-world",
              "ports": ["8000:8000"]
            }')
          echo "$resp" | jq .
          echo "deployment_id=$(echo "$resp" | jq -r .deployment_id)" >> "$GITHUB_OUTPUT"

      # 4. Wait for the agent to pull and start the container
      - name: Wait for deploy
        run: |
          for i in $(seq 1 30); do
            status=$(curl -fsSL "$DD_API/api/v1/deployments/${{ steps.deploy.outputs.deployment_id }}" \
              | jq -r .status)
            echo "  attempt ${i}/30: status=${status}"
            [ "$status" = "running" ] && echo "Deployed!" && exit 0
            [ "$status" = "failed" ] && echo "::error::Deployment failed" && exit 1
            sleep 10
          done
          echo "::error::Timed out waiting for deployment"
          exit 1

name: Website PR Preview

on:
  pull_request:
    paths: ["website/**"]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: website

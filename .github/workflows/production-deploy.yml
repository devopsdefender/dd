name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "scripts/**"
      - ".github/workflows/production-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dd-production
  cancel-in-progress: false

env:
  RUSTFLAGS: "-Dwarnings"
  GCP_ZONE: us-central1-c
  DD_ENV: production
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      binary_url: ${{ steps.upload.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --workspace --release
      - name: Upload as release asset
        id: upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          tag="prod-${sha12}"
          gh release list --limit 20 | grep "^prod-" | awk '{print $1}' | while read -r old; do
            gh release delete "$old" --yes --cleanup-tag 2>/dev/null || true
          done
          gh release create "$tag" \
            --title "prod-${sha12}" \
            --notes "Production build from ${{ github.sha }}" \
            --prerelease \
            target/release/dd-agent
          url=$(gh release view "$tag" --json assets --jq '.assets[] | select(.name=="dd-agent") | .url')
          echo "url=${url}" >> "$GITHUB_OUTPUT"

  cleanup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Delete managed VMs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=production" \
            --format="value(name,zone.basename())" | while read -r name zone; do
            [ -z "$name" ] && continue
            echo "Deleting VM: $name ($zone)"
            gcloud compute instances delete "$name" --project="$GCP_PROJECT_ID" --zone="$zone" --quiet || true
          done

  deploy:
    needs: [build, cleanup]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Create TDX VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_GITHUB_CLIENT_ID: ${{ vars.DD_GITHUB_CLIENT_ID || secrets.DD_GITHUB_CLIENT_ID }}
          DD_GITHUB_CALLBACK_URL: ${{ vars.DD_GITHUB_CALLBACK_URL }}
          DD_GITHUB_CLIENT_SECRET: ${{ secrets.DD_GITHUB_CLIENT_SECRET }}
          BINARY_URL: ${{ needs.build.outputs.binary_url }}
        run: scripts/gcp-deploy.sh

      - name: Wait for agent health
        id: health
        run: |
          for i in $(seq 1 60); do
            health=$(curl -fsS "http://${bootstrap_ip}:8080/health" 2>/dev/null) || true
            if [ -n "$health" ]; then
              hostname=$(echo "$health" | jq -r '.hostname // empty')
              echo "Agent healthy! hostname=${hostname}"
              echo "agent-url=https://${hostname}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "  attempt ${i}/60..." && sleep 5
          done
          echo "::error::Agent not healthy within 5 minutes"
          exit 1

      # ── Integration test: deploy scraper via the tunnel ────────────────

      - name: Deploy scraper (integration test)
        uses: ./.github/actions/deploy-workload
        with:
          agent-url: ${{ steps.health.outputs.agent-url }}
          deploy-spec: apps/scraper/deploy.json
          github-token: ${{ secrets.DD_AGENT_PAT }}

      - name: Verify scraper deployment
        uses: ./.github/actions/verify-deployment
        with:
          agent-url: ${{ steps.health.outputs.agent-url }}
          deployment: scraper
          timeout: 120
          github-token: ${{ secrets.DD_AGENT_PAT }}

      - name: Verify fleet dashboard
        run: |
          dashboard=$(curl -fsS "${{ steps.health.outputs.agent-url }}/" 2>/dev/null) || true
          if echo "$dashboard" | grep -qi "scraper"; then
            echo "Fleet dashboard shows scraper workload"
          else
            echo "::warning::Scraper not visible on fleet dashboard HTML"
          fi

name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "control-plane/**"
      - "images/**"
      - "infra/**"
      - ".github/workflows/production-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dd-production
  cancel-in-progress: false

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --workspace --release

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-packer@v3
      - run: pip install ansible

      - name: Bake GCP agent image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          ansible-playbook infra/ansible/playbooks/gcp-image-bake.yml \
            -e source_image_project=ubuntu-os-cloud \
            -e source_image_family=ubuntu-2404-lts-amd64 \
            -e "target_image_name=dd-agent-prod-${sha12}" \
            -e target_image_family=dd-agent-prod \
            -e "dd_agent_binary_path=${GITHUB_WORKSPACE}/target/release/dd-agent" \
            -e "dd_cp_binary_path=${GITHUB_WORKSPACE}/target/release/dd-cp" \
            -e "packer_template_path=${GITHUB_WORKSPACE}/images/packer/gcp-agent-image.pkr.hcl" \
            -e "source_sha=${{ github.sha }}"

      - name: Cleanup old production VMs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}
        run: |
          ansible-playbook infra/ansible/playbooks/gcp-cleanup-managed-vms.yml \
            -e dd_env_name=production

      - name: Deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DD_CP_ADMIN_PASSWORD: ${{ secrets.DD_CP_ADMIN_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          INTEL_API_KEY: ${{ secrets.INTEL_API_KEY }}
          DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}
          DD_GIT_SHA: ${{ github.sha }}
          DD_ENV: production
        run: |
          ansible-playbook infra/ansible/playbooks/gcp-deploy.yml \
            -e num_tiny_agents=0 -e num_standard_agents=0 -e num_llm_agents=0 \
            -e dd_env=production \
            -e source_image_family=dd-agent-prod

      - name: Smoke check
        run: |
          url="https://app.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          for i in $(seq 1 30); do
            curl -fsS "${url}/health" >/dev/null 2>&1 && echo "Healthy!" && exit 0
            echo "  attempt ${i}/30..." && sleep 10
          done
          echo "::error::Not healthy within 5 minutes"
          exit 1

      - name: Integration test -- deploy hello world
        id: integration
        run: |
          set -euo pipefail
          api="https://app.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"

          # Deploy nginx as a hello-world test app
          http_code=$(curl -s -o /tmp/deploy-resp.json -w '%{http_code}' \
            "$api/api/v1/deploy" \
            -H "Content-Type: application/json" \
            -d '{"image": "nginx:alpine", "app_name": "hello-world-test", "ports": ["8080:80"]}')

          if [ "$http_code" = "404" ]; then
            echo "No agents available -- skipping integration test"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$http_code" != "201" ]; then
            echo "::error::Deploy returned HTTP $http_code"
            cat /tmp/deploy-resp.json
            exit 1
          fi

          cat /tmp/deploy-resp.json | jq .
          dep_id=$(jq -r .deployment_id /tmp/deploy-resp.json)
          echo "deployment_id=$dep_id" >> "$GITHUB_OUTPUT"

          # Wait for the agent to pull and start the container
          for i in $(seq 1 12); do
            status=$(curl -fsSL "$api/api/v1/deployments/$dep_id" | jq -r .status)
            echo "  attempt ${i}/12: status=${status}"
            [ "$status" = "running" ] && echo "Integration test passed!" && exit 0
            [ "$status" = "failed" ] && echo "::error::Hello world deploy failed" && exit 1
            sleep 5
          done
          echo "::error::Hello world deploy timed out (60s)"
          exit 1

      - name: Cleanup test deployment
        if: always() && steps.integration.outputs.deployment_id
        run: |
          api="https://app.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          curl -s -X POST "$api/api/v1/deployments/${{ steps.integration.outputs.deployment_id }}/stop" || true

name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/**"
      - ".github/workflows/production-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dd-production
  cancel-in-progress: false

env:
  RUSTFLAGS: "-Dwarnings"
  GCP_ZONE: us-central1-c
  DD_ENV: production
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      binary_url: ${{ steps.upload.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --workspace --release
      - name: Upload as release asset
        id: upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          tag="prod-${sha12}"
          gh release list --limit 20 | grep "^prod-" | awk '{print $1}' | while read -r old; do
            gh release delete "$old" --yes --cleanup-tag 2>/dev/null || true
          done
          gh release create "$tag" \
            --title "prod-${sha12}" \
            --notes "Production build from ${{ github.sha }}" \
            --prerelease \
            target/release/dd-client \
            target/release/dd-register \
            target/release/dd-web
          url=$(gh release view "$tag" --json assets --jq '.assets[] | select(.name=="dd-client") | .url')
          echo "url=${url}" >> "$GITHUB_OUTPUT"

  cleanup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Delete managed VMs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=production" \
            --format="value(name,zone.basename())" | while read -r name zone; do
            [ -z "$name" ] && continue
            echo "Deleting VM: $name ($zone)"
            gcloud compute instances delete "$name" --project="$GCP_PROJECT_ID" --zone="$zone" --quiet || true
          done

  deploy:
    needs: [build, cleanup]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Create TDX VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_GITHUB_CLIENT_ID: ${{ vars.DD_GITHUB_CLIENT_ID || secrets.DD_GITHUB_CLIENT_ID }}
          DD_GITHUB_CALLBACK_URL: ${{ vars.DD_GITHUB_CALLBACK_URL }}
          DD_GITHUB_CLIENT_SECRET: ${{ secrets.DD_GITHUB_CLIENT_SECRET }}
          BINARY_URL: ${{ needs.build.outputs.binary_url }}
        run: scripts/gcp-deploy.sh

      - name: Wait for agent health
        env:
          AGENT_URL: https://app.${{ env.DD_DOMAIN }}
        run: |
          for i in $(seq 1 60); do
            curl -fsS "${AGENT_URL}/health" >/dev/null 2>&1 && {
              echo "Agent healthy at ${AGENT_URL}"
              exit 0
            }
            echo "  waiting for tunnel... (${i}/60)"
            sleep 5
          done
          echo "::error::Agent not healthy within 5 minutes"
          exit 1

      - name: Verify dashboard renders
        env:
          AGENT_URL: https://app.${{ env.DD_DOMAIN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # dd-web's fleet dashboard at /. Auth-gated: we pass the
          # workflow's github.token as a Bearer so resolve_auth takes
          # the PAT-as-Bearer branch (#68) — installation tokens then
          # fall through to the repo-access probe in verify_github_token.
          # Retry on cloudflared 530 (tunnel flake right after /health).
          for attempt in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${AGENT_URL}/" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Dashboard renders (HTTP 200, attempt ${attempt})"
              exit 0
            fi
            echo "  dashboard returned HTTP ${code}, retrying... (${attempt}/12)"
            sleep 5
          done
          echo "::error::dashboard / never returned 200 (last HTTP ${code})"
          exit 1

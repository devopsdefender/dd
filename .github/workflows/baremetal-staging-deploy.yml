name: Baremetal Staging Deploy

on:
  push:
    branches: [main, staging]
    paths:
      - "agent/**"
      - "control-plane/**"
      - "images/**"
      - "infra/**"
      - ".github/workflows/baremetal-*"
  workflow_dispatch:

concurrency:
  group: dd-baremetal-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: pip install ansible

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.BAREMETAL_STAGING_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy control plane and agent to staging host
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          ansible-playbook infra/ansible/playbooks/baremetal-deploy.yml \
            -i "${{ vars.BAREMETAL_STAGING_HOST }}," \
            -u "${{ vars.BAREMETAL_STAGING_USER }}" \
            --private-key ~/.ssh/deploy_key \
            -e "agent_binary_local=${GITHUB_WORKSPACE}/target/release/dd-agent" \
            -e "cp_binary_local=${GITHUB_WORKSPACE}/target/release/dd-cp" \
            -e "packer_template_dir=${GITHUB_WORKSPACE}/images/packer" \
            -e "image_name=dd-baremetal-${sha12}" \
            -e "dd_env=staging" \
            -e "dd_skip_attestation=true" \
            -e "agent_node_size=standard" \
            -e "dd_cp_admin_password=${{ secrets.DD_CP_ADMIN_PASSWORD }}" \
            -e "dd_cp_cf_api_token=${{ secrets.STAGING_CF_API_TOKEN || secrets.DD_CP_CF_API_TOKEN }}" \
            -e "dd_cp_cf_account_id=${{ secrets.STAGING_CF_ACCOUNT_ID || secrets.DD_CP_CF_ACCOUNT_ID }}" \
            -e "dd_cp_cf_zone_id=${{ secrets.STAGING_CF_ZONE_ID || secrets.DD_CP_CF_ZONE_ID }}" \
            -e "dd_cp_cf_domain=${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}" \
            -e "dd_cp_git_sha=${{ github.sha }}"

      - name: Wait for public endpoint
        run: |
          url="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          echo "Waiting for Cloudflare tunnel to become reachable..."
          for i in $(seq 1 60); do
            if curl -fsS "${url}/health" 2>&1; then
              echo "Public endpoint is up!"
              exit 0
            fi
            echo "  attempt ${i}/60..." && sleep 5
          done
          echo "::error::Public endpoint not reachable within 5 minutes"
          exit 1

      - name: Deploy private-llm (CPU mode)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CP_URL="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=devopsdefender" | jq -r '.value')
          gh api repos/devopsdefender/private-llm/contents/docker-compose.yml \
            -H "Accept: application/vnd.github.raw" > /tmp/compose.yml
          COMPOSE_B64=$(base64 -w0 /tmp/compose.yml)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${CP_URL}/api/v1/deploy" \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"app_name\":\"private-llm\",\"app_version\":\"${{ github.sha }}\",\"compose\":\"${COMPOSE_B64}\",\"node_size\":\"standard\"}")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::warning::LLM deploy returned HTTP ${HTTP_CODE}: ${BODY} (non-fatal)"
          fi

      - name: Smoke check
        run: |
          url="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          for i in $(seq 1 30); do
            if curl -fsS "${url}/health" 2>&1; then
              echo "Healthy!"
              exit 0
            fi
            echo "  attempt ${i}/30..." && sleep 10
          done
          echo "::error::Staging health check failed — not healthy within 5 minutes"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

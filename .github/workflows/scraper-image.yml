name: Build & Deploy Scraper

on:
  push:
    branches: [main]
    paths:
      - "agent/src/bin/dd-scraper/**"
      - "Dockerfile.scraper"
      - "apps/scraper/**"
  workflow_dispatch:

permissions:
  packages: write

env:
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.scraper
          push: true
          tags: |
            ghcr.io/devopsdefender/dd-scraper:${{ github.sha }}
            ghcr.io/devopsdefender/dd-scraper:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [staging, production]
        include:
          - env: staging
            url_prefix: app-staging
          - env: production
            url_prefix: app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy scraper
        uses: ./.github/actions/deploy-workload
        with:
          agent-url: https://${{ matrix.url_prefix }}.${{ env.DD_DOMAIN }}
          deploy-spec: apps/scraper/deploy.json
          github-token: ${{ secrets.DD_AGENT_PAT }}

      - name: Verify scraper
        uses: ./.github/actions/verify-deployment
        with:
          agent-url: https://${{ matrix.url_prefix }}.${{ env.DD_DOMAIN }}
          deployment: scraper
          timeout: 120
          github-token: ${{ secrets.DD_AGENT_PAT }}

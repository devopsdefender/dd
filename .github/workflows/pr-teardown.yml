name: PR Teardown

# Cleanup the per-PR ephemeral preview env created by release.yml:
# delete the VM, the Cloudflare tunnel, and the DNS CNAME for
# pr-{N}.{domain}. Idempotent — skips silently if nothing to reap.
#
# Triggers on branch delete (not PR close): closing a PR without
# deleting the branch keeps the preview up in case the PR is
# reopened. When the branch is deleted — either manually or by
# GitHub's "delete branch on merge" setting — we know the dev is
# done and the preview can go.
#
# The `delete` event payload doesn't include the PR number, so we
# look it up from the branch name. If no PR ever existed for the
# branch, there's nothing to tear down.

on:
  delete:

permissions:
  contents: read

env:
  GCP_ZONE: us-central1-c

jobs:
  teardown:
    # Skip tag deletions — we only care about branches.
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    steps:
      - name: Resolve PR number from deleted branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.ref }}
        run: |
          # `gh pr list` returns PRs whose head branch matches. Search
          # all states — a merged PR's head branch is the usual
          # trigger for this workflow. `--limit 1` + newest wins if
          # the branch was ever reused across multiple PRs.
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --state all \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for deleted branch $BRANCH — nothing to tear down."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tearing down preview for PR #$PR_NUMBER (branch $BRANCH)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "dd_env=pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "dd_hostname=pr-$PR_NUMBER.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: google-github-actions/auth@v2
        if: steps.pr.outputs.skip != 'true'
        with:
          workload_identity_provider: 'projects/654815109728/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-staging-ci@eestaging.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2
        if: steps.pr.outputs.skip != 'true'

      - name: Delete PR VMs
        if: steps.pr.outputs.skip != 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DD_ENV: ${{ steps.pr.outputs.dd_env }}
        run: |
          VMS=$(gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=${DD_ENV}" \
            --format="value(name)")
          if [ -z "$VMS" ]; then
            echo "No dd-${DD_ENV} VMs to delete."
          else
            echo "Deleting: $(echo "$VMS" | tr '\n' ' ')"
            # shellcheck disable=SC2086
            gcloud compute instances delete $VMS \
              --project="$GCP_PROJECT_ID" --zone="$GCP_ZONE" --quiet
          fi

      - name: Delete CF tunnels for this PR
        if: steps.pr.outputs.skip != 'true'
        env:
          CF_API_TOKEN: ${{ secrets.STAGING_CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.STAGING_CF_ACCOUNT_ID }}
          DD_ENV: ${{ steps.pr.outputs.dd_env }}
        run: |
          # Tunnels are named `dd-{DD_ENV}-{uuid}` (see
          # dd-common/src/tunnel.rs::create_agent_tunnel). List all
          # tunnels with the dd-{DD_ENV}- prefix and delete each.
          resp=$(curl -fsS \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/cfd_tunnel?is_deleted=false&per_page=200")
          ids=$(echo "$resp" | jq -r --arg prefix "dd-${DD_ENV}-" \
            '.result[] | select(.name | startswith($prefix)) | .id')
          if [ -z "$ids" ]; then
            echo "No CF tunnels with prefix dd-${DD_ENV}-"
          else
            for id in $ids; do
              echo "Deleting tunnel $id"
              # Drain connections first (some stale connections block delete).
              curl -fsS -X DELETE \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/cfd_tunnel/${id}/connections" \
                >/dev/null || true
              curl -fsS -X DELETE \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/cfd_tunnel/${id}" \
                >/dev/null || echo "::warning::tunnel $id delete failed (may already be gone)"
            done
          fi

      - name: Delete DNS CNAME for PR hostname
        if: steps.pr.outputs.skip != 'true'
        env:
          CF_API_TOKEN: ${{ secrets.STAGING_CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.STAGING_CF_ZONE_ID }}
          DD_HOSTNAME: ${{ steps.pr.outputs.dd_hostname }}
        run: |
          record_id=$(curl -fsS \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${DD_HOSTNAME}" \
            | jq -r '.result[0].id // empty')
          if [ -z "$record_id" ]; then
            echo "No CNAME for ${DD_HOSTNAME}"
          else
            echo "Deleting CNAME record $record_id (${DD_HOSTNAME})"
            curl -fsS -X DELETE \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
              >/dev/null
          fi

name: Push Management Image

# Builds the unified dd container image and pushes to ghcr.io.
# This image is deployed as a workload inside easyenclave-sealed
# TDX VMs (app-staging.devopsdefender.com, app.devopsdefender.com).
#
# On PRs: builds the image (validates Dockerfile + compiles),
#         but does NOT push — only main pushes publish.
# On push to main: builds and pushes to ghcr.io with :latest tag.
# workflow_dispatch: manual trigger.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/push-management-images.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/push-management-images.yml"
  workflow_dispatch:

concurrency:
  group: push-management-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ghcr.io/devopsdefender/dd:latest
          cache-from: type=gha,scope=dd
          cache-to: type=gha,scope=dd,mode=max

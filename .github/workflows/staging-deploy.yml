name: Staging Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/**"
      - ".github/workflows/staging-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dd-staging
  cancel-in-progress: true

env:
  RUSTFLAGS: "-Dwarnings"
  GCP_ZONE: us-central1-c
  DD_ENV: staging
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      binary_url: ${{ steps.upload.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --workspace --release
      - name: Upload as release asset
        id: upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          tag="staging-${sha12}"

          gh release list --limit 20 | grep "^staging-" | awk '{print $1}' | while read -r old; do
            gh release delete "$old" --yes --cleanup-tag 2>/dev/null || true
          done

          gh release create "$tag" \
            --title "staging-${sha12}" \
            --notes "Staging build from ${{ github.sha }}" \
            --prerelease \
            target/release/dd-client \
            target/release/dd-register \
            target/release/dd-web

          url=$(gh release view "$tag" --json assets --jq '.assets[] | select(.name=="dd-client") | .url')
          echo "url=${url}" >> "$GITHUB_OUTPUT"

  cleanup:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write   # mint GitHub OIDC token for GCP WIF
    steps:
      # GCP Workload Identity Federation (no stored SA key). Pool +
      # provider in the eestaging project (dd staging's GCP), attribute
      # condition is `assertion.repository == 'devopsdefender/dd'`, SA
      # binding is scoped to the same principal set.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/654815109728/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-staging-ci@eestaging.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2
      - name: Delete managed VMs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=staging" \
            --format="value(name,zone.basename())" | while read -r name zone; do
            [ -z "$name" ] && continue
            echo "Deleting VM: $name ($zone)"
            gcloud compute instances delete "$name" --project="$GCP_PROJECT_ID" --zone="$zone" --quiet || true
          done

  deploy:
    needs: [build, cleanup]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write   # mint GitHub OIDC token for GCP WIF + dd-web OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/654815109728/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-staging-ci@eestaging.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2

      - name: Create TDX VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_GITHUB_CLIENT_ID: ${{ vars.DD_GITHUB_CLIENT_ID || secrets.DD_GITHUB_CLIENT_ID }}
          DD_GITHUB_CALLBACK_URL: ${{ vars.DD_GITHUB_CALLBACK_URL }}
          DD_GITHUB_CLIENT_SECRET: ${{ secrets.DD_GITHUB_CLIENT_SECRET }}
          BINARY_URL: ${{ needs.build.outputs.binary_url }}
        run: scripts/gcp-deploy.sh

      # ── Verify agent via tunnel (no raw IP needed) ────────────────────
      # DD_HOSTNAME is set by gcp-deploy.sh to app-staging.${DD_DOMAIN},
      # which is the tunnel hostname. CI polls it directly.

      - name: Wait for agent health
        env:
          AGENT_URL: https://app-staging.${{ env.DD_DOMAIN }}
        run: |
          for i in $(seq 1 60); do
            curl -fsS "${AGENT_URL}/health" >/dev/null 2>&1 && {
              echo "Agent healthy at ${AGENT_URL}"
              exit 0
            }
            echo "  waiting for tunnel... (${i}/60)"
            sleep 5
          done
          echo "::error::Agent not healthy within 5 minutes"
          exit 1

      - name: Verify dashboard renders (OIDC)
        env:
          AGENT_URL: https://app-staging.${{ env.DD_DOMAIN }}
        run: |
          # Canonical "auth from a GitHub Action" pattern: mint an
          # OIDC JWT with audience=dd-web, hit the dashboard as Bearer.
          # dd-web verifies the signature via GitHub's JWKS, enforces
          # iss/aud/exp, and checks repository_owner claim == DD_OWNER.
          # Requires permissions: id-token: write on this job.
          ID_TOKEN=$(curl -sSL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json; api-version=2.0" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=dd-web" \
            | jq -r '.value')

          if [ -z "$ID_TOKEN" ] || [ "$ID_TOKEN" = "null" ]; then
            echo "::error::failed to mint OIDC token (is id-token:write set?)"
            exit 1
          fi

          # Retry on cloudflared 530 (tunnel settle right after /health).
          for attempt in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${ID_TOKEN}" \
              "${AGENT_URL}/" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Dashboard renders (HTTP 200, attempt ${attempt}, OIDC)"
              exit 0
            fi
            echo "  dashboard returned HTTP ${code}, retrying... (${attempt}/12)"
            sleep 5
          done
          echo "::error::dashboard / never returned 200 (last HTTP ${code})"
          exit 1

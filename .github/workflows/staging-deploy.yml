name: Staging Deploy

on:
  push:
    branches: [main, staging]
    paths:
      - "agent/**"
      - "control-plane/**"
      - "images/**"
      - "infra/**"
      - ".github/workflows/staging-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dd-staging
  cancel-in-progress: true

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check GCP credentials
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "::warning::GCP staging deploy skipped — GCP_SERVICE_ACCOUNT_KEY secret is not configured."
            echo "Staging is deployed via the Baremetal Staging Deploy workflow instead."
            echo "SKIP_GCP=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_GCP != 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: env.SKIP_GCP != 'true'
      - uses: Swatinem/rust-cache@v2
        if: env.SKIP_GCP != 'true'

      - name: Build release binaries
        if: env.SKIP_GCP != 'true'
        run: cargo build --workspace --release

      - uses: google-github-actions/auth@v2
        if: env.SKIP_GCP != 'true'
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: env.SKIP_GCP != 'true'
      - uses: hashicorp/setup-packer@v3
        if: env.SKIP_GCP != 'true'
      - run: pip install ansible
        if: env.SKIP_GCP != 'true'

      - name: Bake GCP agent image
        if: env.SKIP_GCP != 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          ansible-playbook infra/ansible/playbooks/gcp-image-bake.yml \
            -e source_image_project=ubuntu-os-cloud \
            -e source_image_family=ubuntu-2404-lts-amd64 \
            -e "target_image_name=dd-agent-main-${sha12}" \
            -e target_image_family=dd-agent-main \
            -e "dd_agent_binary_path=${GITHUB_WORKSPACE}/target/release/dd-agent" \
            -e "dd_cp_binary_path=${GITHUB_WORKSPACE}/target/release/dd-cp" \
            -e "packer_template_path=${GITHUB_WORKSPACE}/images/packer/gcp-agent-image.pkr.hcl" \
            -e "source_sha=${{ github.sha }}"

      - name: Deploy
        if: env.SKIP_GCP != 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DD_CP_ADMIN_PASSWORD: ${{ secrets.DD_CP_ADMIN_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}
          DD_GIT_SHA: ${{ github.sha }}
        run: |
          ansible-playbook infra/ansible/playbooks/gcp-deploy.yml \
            -e num_tiny_agents=1 -e num_standard_agents=0 -e num_llm_agents=0

      - name: Smoke check
        if: env.SKIP_GCP != 'true'
        run: |
          url="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          for i in $(seq 1 30); do
            if curl -fsS "${url}/health" 2>&1; then
              echo "Healthy!"
              exit 0
            fi
            echo "  attempt ${i}/30..." && sleep 10
          done
          echo "::error::Staging health check failed — not healthy within 5 minutes"
          exit 1

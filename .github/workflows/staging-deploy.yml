name: Staging Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - "agent/**"
      - "Dockerfile.scraper"
      - "scripts/**"
      - ".github/workflows/staging-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dd-staging
  cancel-in-progress: true

env:
  RUSTFLAGS: "-Dwarnings"
  GCP_ZONE: us-central1-c
  DD_ENV: staging
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      binary_url: ${{ steps.upload.outputs.url }}
      ddctl_binary_url: ${{ steps.upload.outputs.ddctl_url }}
      scraper_image: ${{ steps.scraper_meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --workspace --release
      - name: Upload as release asset
        id: upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          tag="staging-${sha12}"

          gh release list --limit 20 | grep "^staging-" | awk '{print $1}' | while read -r old; do
            gh release delete "$old" --yes --cleanup-tag 2>/dev/null || true
          done

          gh release create "$tag" \
            --title "staging-${sha12}" \
            --notes "Staging build from ${{ github.sha }}" \
            --prerelease \
            target/release/dd-agent \
            target/release/ddctl

          url=$(gh release view "$tag" --json assets --jq '.assets[] | select(.name=="dd-agent") | .url')
          ddctl_url=$(gh release view "$tag" --json assets --jq '.assets[] | select(.name=="ddctl") | .url')
          echo "url=${url}" >> "$GITHUB_OUTPUT"
          echo "ddctl_url=${ddctl_url}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set scraper image tag
        id: scraper_meta
        run: echo "image=ghcr.io/devopsdefender/dd-scraper:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.scraper
          push: true
          tags: ${{ steps.scraper_meta.outputs.image }}

  cleanup:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Delete managed VMs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=staging" \
            --format="value(name,zone.basename())" | while read -r name zone; do
            [ -z "$name" ] && continue
            echo "Deleting VM: $name ($zone)"
            gcloud compute instances delete "$name" --project="$GCP_PROJECT_ID" --zone="$zone" --quiet || true
          done

  deploy:
    needs: [build, cleanup]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Create TDX VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_GITHUB_CLIENT_ID: ${{ vars.DD_GITHUB_CLIENT_ID || secrets.DD_GITHUB_CLIENT_ID }}
          DD_GITHUB_CALLBACK_URL: ${{ vars.DD_GITHUB_CALLBACK_URL }}
          DD_GITHUB_CLIENT_SECRET: ${{ secrets.DD_GITHUB_CLIENT_SECRET }}
          BINARY_URL: ${{ needs.build.outputs.binary_url }}
          DDCTL_BINARY_URL: ${{ needs.build.outputs.ddctl_binary_url }}
          DD_SCRAPER_IMAGE: ${{ needs.build.outputs.scraper_image }}
        run: scripts/gcp-deploy.sh

      - name: Wait for agent health
        run: |
          for i in $(seq 1 60); do
            curl -fsS "http://${bootstrap_ip}:8080/health" >/dev/null 2>&1 && echo "Agent healthy!" && exit 0
            echo "  attempt ${i}/60..." && sleep 5
          done
          echo "::error::Agent not healthy within 5 minutes"
          exit 1

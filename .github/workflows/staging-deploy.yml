name: Staging Deploy

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/gcp-deploy.sh"
      - ".github/workflows/staging-deploy.yml"
      - ".github/workflows/push-management-images.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag (default: latest)'
        required: false
        default: 'latest'

concurrency:
  group: dd-staging
  cancel-in-progress: true

env:
  GCP_ZONE: us-central1-c
  DD_ENV: staging
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write   # mint GitHub OIDC token for GCP WIF
    steps:
      # GCP Workload Identity Federation (no stored SA key). Pool +
      # provider in the eestaging project (dd staging's GCP), attribute
      # condition is `assertion.repository == 'devopsdefender/dd'`, SA
      # binding is scoped to the same principal set.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/654815109728/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-staging-ci@eestaging.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2
      - name: Delete managed VMs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=staging" \
            --format="value(name,zone.basename())" | while read -r name zone; do
            [ -z "$name" ] && continue
            echo "Deleting VM: $name ($zone)"
            gcloud compute instances delete "$name" --project="$GCP_PROJECT_ID" --zone="$zone" --quiet || true
          done

  deploy:
    needs: [cleanup]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write   # mint GitHub OIDC token for GCP WIF + dd-web OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/654815109728/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-staging-ci@eestaging.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2

      - name: Create TDX VM (boots from easyenclave, runs dd management as workload)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.DD_CP_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DD_CP_CF_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.DD_CP_CF_ZONE_ID }}
          DD_GITHUB_CLIENT_ID: ${{ vars.DD_GITHUB_CLIENT_ID || secrets.DD_GITHUB_CLIENT_ID }}
          DD_GITHUB_CALLBACK_URL: ${{ vars.DD_GITHUB_CALLBACK_URL }}
          DD_GITHUB_CLIENT_SECRET: ${{ secrets.DD_GITHUB_CLIENT_SECRET }}
          DD_IMAGE: ghcr.io/devopsdefender/dd:${{ inputs.image_tag || 'latest' }}
        run: scripts/gcp-deploy.sh

      # ── Verify agent via tunnel (no raw IP needed) ────────────────────
      # DD_HOSTNAME is set by gcp-deploy.sh to app-staging.${DD_DOMAIN},
      # which is the tunnel hostname. CI polls it directly.

      - name: Wait for agent health (streams serial console)
        env:
          AGENT_URL: https://app-staging.${{ env.DD_DOMAIN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ env.GCP_ZONE }}
        run: |
          # Resolve the VM that gcp-deploy.sh just created. dd-staging-$(date +%s)
          # naming means the newest matching VM is the right one.
          VM_NAME=$(gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="labels.devopsdefender=managed AND labels.dd_env=staging" \
            --format="value(name)" --sort-by=~creationTimestamp | head -1)
          if [ -z "$VM_NAME" ]; then
            echo "::error::no dd-staging VM found — gcp-deploy.sh must have failed"
            exit 1
          fi
          echo "Watching VM: $VM_NAME (zone: $GCP_ZONE)"

          LAST_LINES=0
          for i in $(seq 1 60); do
            # Pull full serial log; print only new lines since last iter.
            # This gives a live-streaming boot console in the Action log
            # so failures (fast-fail in initrd, DHCP hang, libcontainer
            # pull error, etc.) are visible without shelling into GCP.
            gcloud compute instances get-serial-port-output "$VM_NAME" \
              --project="$GCP_PROJECT_ID" --zone="$GCP_ZONE" 2>/dev/null \
              > /tmp/serial.log || true
            TOTAL_LINES=$(wc -l < /tmp/serial.log)
            if [ "$TOTAL_LINES" -gt "$LAST_LINES" ]; then
              tail -n +$((LAST_LINES + 1)) /tmp/serial.log \
                | sed 's/^/[serial] /'
              LAST_LINES=$TOTAL_LINES
            fi

            # Fatal patterns — early-fail instead of waiting the full 5 min.
            if grep -qE "FATAL|Kernel panic|Invalid ELF header|/bin/sh: can't access tty" /tmp/serial.log; then
              echo "::error::boot failed — serial log shows fatal pattern"
              exit 1
            fi

            # Success: /health returns 200 via the Cloudflare tunnel.
            # That tests the full chain: VM boot → easyenclave init →
            # libcontainer pulls dd-register/dd-web → cloudflared tunnel up.
            if curl -fsS "${AGENT_URL}/health" >/dev/null 2>&1; then
              echo "Agent healthy at ${AGENT_URL}"
              exit 0
            fi
            echo "  waiting for tunnel... (${i}/60)"
            sleep 5
          done
          echo "::error::Agent not healthy within 5 minutes"
          echo "--- final serial tail ---"
          tail -80 /tmp/serial.log | sed 's/^/[serial] /'
          exit 1

      - name: Verify dashboard renders (OIDC)
        env:
          AGENT_URL: https://app-staging.${{ env.DD_DOMAIN }}
        run: |
          # Canonical "auth from a GitHub Action" pattern: mint an
          # OIDC JWT with audience=dd-web, hit the dashboard as Bearer.
          # dd-web verifies the signature via GitHub's JWKS, enforces
          # iss/aud/exp, and checks repository_owner claim == DD_OWNER.
          # Requires permissions: id-token: write on this job.
          ID_TOKEN=$(curl -sSL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json; api-version=2.0" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=dd-web" \
            | jq -r '.value')

          if [ -z "$ID_TOKEN" ] || [ "$ID_TOKEN" = "null" ]; then
            echo "::error::failed to mint OIDC token (is id-token:write set?)"
            exit 1
          fi

          # Retry on cloudflared 530 (tunnel settle right after /health).
          for attempt in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${ID_TOKEN}" \
              "${AGENT_URL}/" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Dashboard renders (HTTP 200, attempt ${attempt}, OIDC)"
              exit 0
            fi
            echo "  dashboard returned HTTP ${code}, retrying... (${attempt}/12)"
            sleep 5
          done
          echo "::error::dashboard / never returned 200 (last HTTP ${code})"
          exit 1

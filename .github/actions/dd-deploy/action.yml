name: Deploy workload to a DD agent
description: >-
  Mint a per-job GitHub Actions OIDC token, discover the target agent's
  current hostname from the DD control-plane's /api/agents, and POST
  the workload JSON to the agent's /deploy endpoint. The agent verifies
  the OIDC token (issuer = token.actions.githubusercontent.com,
  repository_owner = DD_OWNER, audience match) entirely in-code — no
  shared secrets to configure. The caller's job must declare
  `permissions: id-token: write`.

inputs:
  cp-url:
    description: 'Control-plane URL (e.g. https://app.devopsdefender.com)'
    required: true
  vm-name:
    description: 'Target agent vm_name as reported on /api/agents (e.g. dd-local-prod)'
    required: true
  workload:
    description: 'Path to the workload JSON spec to deploy'
    required: true
  audience:
    description: 'OIDC audience the agent expects — must match gh_oidc::Verifier audience (default: dd-agent)'
    required: false
    default: dd-agent
  wait-for-deployment-seconds:
    description: 'Seconds to poll the agent /health waiting for app_name in deployments. 0 = skip wait.'
    required: false
    default: '120'

outputs:
  agent-host:
    description: 'Hostname the workload was deployed to'
    value: ${{ steps.deploy.outputs.agent-host }}
  app-name:
    description: 'app_name parsed from the workload JSON'
    value: ${{ steps.deploy.outputs.app-name }}

runs:
  using: composite
  steps:
    - name: Deploy
      id: deploy
      shell: bash
      env:
        CP_URL: ${{ inputs.cp-url }}
        VM_NAME: ${{ inputs.vm-name }}
        WORKLOAD: ${{ inputs.workload }}
        AUDIENCE: ${{ inputs.audience }}
        WAIT_SECS: ${{ inputs.wait-for-deployment-seconds }}
      run: |
        set -euo pipefail

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::error::id-token not available — the calling job needs 'permissions: id-token: write'"
          exit 1
        fi

        # Mint the GH OIDC token first — `/api/agents` now requires
        # Authorization (repository_owner must match DD_OWNER), same
        # as `/deploy`. Audience matches what the agent verifier
        # expects; the CP reuses that.
        oidc=$(curl -fsSL \
          -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}" | jq -r .value)

        # Discover the agent hostname from the CP's source of truth.
        # Registration is already ITA-gated by the CP. Do not block on
        # the CP collector marking it healthy here: freshly-created
        # Cloudflare DNS can be visible to the GitHub runner before it
        # is visible inside the just-booted CP VM. The collector may
        # briefly mark that agent stale for the same reason. The next
        # gate probes the agent API hostname directly before POSTing
        # /deploy, so direct reachability remains authoritative.
        echo "waiting for registered agent vm_name=$VM_NAME on $CP_URL"
        deadline=$(( $(date +%s) + 120 ))
        agent_host=""
        last_agents=""
        while [ "$(date +%s)" -lt "$deadline" ]; do
          agents=$(curl -fsS \
            --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer ${oidc}" \
            "${CP_URL}/api/agents" 2>/dev/null || true)
          if [ -n "$agents" ]; then
            last_agents="$agents"
            agent_host=$(echo "$agents" | jq -r --arg vm "$VM_NAME" '
                [.[] | select(.vm_name == $vm and (.status == "healthy" or .status == "registering" or .status == "stale"))]
                | sort_by(.last_seen) | reverse | .[0].hostname // empty')
            [ -n "$agent_host" ] && break
          fi
          sleep 5
        done
        if [ -z "$agent_host" ]; then
          echo "::error::no registered agent with vm_name=$VM_NAME within 120s"
          if [ -n "$last_agents" ]; then
            echo "$last_agents" | jq -r --arg vm "$VM_NAME" '
              .[] | select(.vm_name == $vm)
              | "  \(.vm_name) status=\(.status) last_seen=\(.last_seen) host=https://\(.hostname)"'
          fi
          exit 1
        fi
        agent_label="${agent_host%%.*}"
        agent_domain="${agent_host#*.}"
        if [[ "$agent_label" == *-agent-* ]]; then
          agent_api_label="${agent_label/-agent-/-api-}"
        else
          agent_api_label="${agent_label}-agent-api"
        fi
        agent_api_host="${agent_api_label}.${agent_domain}"
        echo "agent-host=$agent_host" >> "$GITHUB_OUTPUT"

        # The agent API hostname and its Cloudflare routing app are created
        # immediately before preview deploys. DNS can resolve before the
        # route is active at every edge, which shows up as transient
        # failures on /deploy. Gate the mutating request on the read-only health
        # endpoint being reachable through the same hostname.
        echo "waiting for agent API health at $agent_api_host"
        deadline=$(( $(date +%s) + 600 ))
        last_health_error=""
        agent_api_ready=0
        while [ "$(date +%s)" -lt "$deadline" ]; do
          if health=$(curl -fsS "https://${agent_api_host}/health" 2>&1); then
            if echo "$health" | jq -e '.service == "agent" and .ok == true' >/dev/null; then
              echo "agent API is ready"
              agent_api_ready=1
              break
            fi
            last_health_error="unexpected health body: ${health:0:400}"
          else
            last_health_error="$health"
          fi
          sleep 5
        done
        if [ "$agent_api_ready" -ne 1 ]; then
          echo "::error::agent API ${agent_api_host} did not become ready within 600s: ${last_health_error}"
          exit 1
        fi

        # Compact + inspect the workload spec.
        spec=$(jq -c . "$WORKLOAD")
        app_name=$(echo "$spec" | jq -r '.app_name // empty')
        if [ -z "$app_name" ]; then
          echo "::error::$WORKLOAD has no .app_name"
          exit 1
        fi
        echo "app-name=$app_name" >> "$GITHUB_OUTPUT"

        echo "POST /deploy to $agent_api_host (app=$app_name, repo=$GITHUB_REPOSITORY)"
        # Same CF-edge transient can hit the agent hostname too —
        # reuse the same retry envelope. Capture the body so we can
        # show what EE said; the agent forwards it verbatim.
        body=$(curl -fsS \
          --retry 6 --retry-delay 5 --retry-all-errors \
          -X POST "https://${agent_api_host}/deploy" \
          -H "Authorization: Bearer ${oidc}" \
          -H "Content-Type: application/json" \
          -d "$spec")
        echo "agent response: $body"

        if [ "$WAIT_SECS" -gt 0 ]; then
          deadline=$(( $(date +%s) + WAIT_SECS ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            health=$(curl -fsS "https://${agent_api_host}/health" 2>/dev/null || echo '{}')
            if echo "$health" | jq -e --arg app "$app_name" '.deployments // [] | index($app)' >/dev/null; then
              echo "$app_name visible on $agent_api_host"
              exit 0
            fi
            sleep 5
          done
          echo "::error::$app_name never appeared in /health within ${WAIT_SECS}s. Last deployments:"
          echo "$health" | jq '.deployments // []'
          # Surface the agent's own stdout so we have agent-side
          # ground truth without needing SSH. Failing to fetch is
          # itself a signal ("agent isn't reachable") so we keep
          # exit 1 regardless — but we want the fetch attempt to
          # print whatever it can.
          echo "--- dd-agent log from ${agent_api_host} ---"
          agent_log=$(curl -fsS -H "Authorization: Bearer ${oidc}" \
            "https://${agent_api_host}/logs/dd-agent" 2>&1 || true)
          if echo "$agent_log" | jq -e '.lines' >/dev/null 2>&1; then
            echo "$agent_log" | jq -r '.lines[]?'
          else
            echo "$agent_log"
          fi
          exit 1
        fi

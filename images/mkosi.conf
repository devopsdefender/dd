# DevOps Defender Confidential VM Image
# Reproducible build with dm-verity — every byte measured into TDX attestation.
# Based on ConferLabs' approach: mkosi + dm-verity + measured boot.

[Config]
Dependencies=initrd

[Output]
ImageId=dd-agent
ImageVersion=0.1.0
Format=disk
ManifestFormat=json
Seed=dd000000-0000-0000-0000-devopsdefender

[Distribution]
Distribution=ubuntu
Release=noble

[Content]
SourceDateEpoch=0
Initrds=initrd

# Bootable disk with systemd-boot
Bootable=yes
Bootloader=systemd-boot

# Kernel command line — dm-verity roothash appended by mkosi
KernelCommandLine=intel_iommu=on

# dm-verity kernel module in initrd
KernelModulesInitrdInclude=dm-verity
                          dm-mod

PackageManagerTrees=mkosi.pkgmngr

Packages=
    systemd
    systemd-boot-efi
    udev
    ca-certificates
    ubuntu-keyring
    cryptsetup
    curl
    kmod
    linux-generic-hwe-24.04
    linux-headers-generic-hwe-24.04
    # NVIDIA drivers + CUDA (for GPU workloads: vLLM, Claude, etc.)
    nvidia-driver-580-open
    nvidia-persistenced
    cuda-nvcc-12-8
    cuda-cudart-12-8

Autologin=no
Locale=C.UTF-8
Keymap=us

SkeletonTrees=mkosi.skeleton
ExtraTrees=mkosi.extra:/

# Remove non-deterministic files
RemoveFiles=/var/log/*
RemoveFiles=/var/cache
RemoveFiles=/etc/*-
RemoveFiles=/etc/ssh/ssh_host_*_key*
CleanPackageMetadata=yes

[Build]
CacheDirectory=mkosi.cache
Incremental=yes
WithNetwork=yes
Environment=SOURCE_DATE_EPOCH=0
